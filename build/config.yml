# OrcaSQL build configuration
# Run `wails3 task common:update:build-assets` after changing `info`.
version: '3'

info:
  companyName: "My OrcaSQL"
  productName: "OrcaSQL"
  productIdentifier: "com.orcasql.app"
  description: "MySQL GUI Client"
  copyright: "Copyright © 2026"
  comments: "Native MySQL GUI for Windows and macOS"
  version: "0.1.0"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task frontend:dev
      type: background
    - cmd: wails3 task run
      type: primary
